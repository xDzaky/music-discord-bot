app = "music-discord-bot-mongodb"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile"

# Expose MongoDB port untuk Flycast internal TCP access
[[services]]
  internal_port = 27017
  protocol = "tcp"
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    port = 27017

  [services.concurrency]
    type = "connections"
    hard_limit = 100
    soft_limit = 80

[mounts]
  source = "mongodb_data"
  destination = "/data/db"

[vm]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512

[env]
  MONGO_INITDB_DATABASE = "vocard"
