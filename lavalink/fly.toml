app = "music-discord-bot-lavalink"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile"

# Use TCP services for Flycast internal access
[[services]]
  internal_port = 2333
  protocol = "tcp"
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    port = 2333

[vm]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024

[env]
  SERVER_PORT = "2333"
  LAVALINK_SERVER_PASSWORD = "youshallnotpass"
