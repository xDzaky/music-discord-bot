app = "music-discord-bot-lavalink"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile"

[env]
  LAVALINK_REQUEST_LOGGING = "true"
  LOG_LEVEL_LAVALINK = "INFO"
  LOG_LEVEL_ROOT = "INFO"
  SERVER_PORT = "2333"

[[services]]
  protocol = "tcp"
  internal_port = 2333
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    port = 2333

  [[services.tcp_checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "20s"

[vm]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024
